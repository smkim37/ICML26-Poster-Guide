<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- black-translucent는 라이트 테마에서 상태바 텍스트(흰색)가 안 보임 → default + theme-color 조합 -->
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="theme-color" content="#fafaf9" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#09090b" media="(prefers-color-scheme: dark)" />
    <link rel="icon" type="image/svg+xml" href="/ICML26-Poster-Guide/icml-navbar-logo.svg" />
    <link rel="apple-touch-icon" href="/ICML26-Poster-Guide/icons/apple-touch-icon.png" />
    <title>ICML 2026 Poster Guide</title>
    <script>
      // no-flash 다크모드: React 마운트 전에 클래스 적용
      (function () {
        try {
          var t = localStorage.getItem('icml26.theme');
          var dark = t === 'dark' ||
            ((!t || t === 'system') && matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
